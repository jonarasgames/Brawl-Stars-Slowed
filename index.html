<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://files.catbox.moe/strc5w.png" type="image/jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Player de músicas Brawl Stars slowed + reverb com playlists e lançamentos.">
    <title>Brawl Stars Slowed</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nougat&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-overlay"></div>

    <header class="topbar">
        <div class="brand-wrap">
            <img id="brand-logo" crossorigin="anonymous" src="https://files.catbox.moe/hq2ze8.png" alt="Logo Brawl Stars Slowed">
        </div>
        <button id="profile-top-btn" class="profile-top-btn" type="button" aria-label="Abrir perfil">
            <img id="profile-top-photo" src="https://files.catbox.moe/ye5x4f.png" alt="Perfil">
        </button>
    </header>

    <main class="layout">
        <section class="panel player-panel">
            <div class="song-info">
                <img id="current-song-cover" src="https://cdn-assets-eu.frontify.com/s3/frontify-enterprise-files-eu/eyJwYXRoIjoic3VwZXJjZWxsXC9maWxlXC9ucnU0UVNQVlVkVEhvVERxMVpxdS5wbmcifQ:supercell:KyOaqu_1gL2vFJpzEd0AABww3GAZzF688azTXXapoEs?width=2400" alt="Capa da música">
                <div>
                    <h2 id="current-song-title">Nenhuma música selecionada</h2>
                    <p id="current-song-artist"></p>
                </div>
            </div>

            <div class="progress-row">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" class="progress-bar" value="0">
                <span id="duration">0:00</span>
            </div>

            <div class="controls">
                <button id="surprise-btn" class="ctrl" title="Surpreender" aria-label="Tocar aleatória">🎲</button>
                <button id="shuffle-btn" class="ctrl" title="Aleatório" aria-label="Aleatório">🔀</button>
                <button id="prev-btn" class="ctrl" aria-label="Anterior">⏮</button>
                <button id="play-btn" class="ctrl play" aria-label="Tocar">▶</button>
                <button id="next-btn" class="ctrl" aria-label="Próxima">⏭</button>
                <button id="repeat-btn" class="ctrl" title="Repetir" aria-label="Repetir">🔁</button>
                <button id="volume-btn" class="ctrl" aria-label="Volume">🔊</button>
                <input type="range" id="volume-control" class="volume-control" min="0" max="1" step="0.1" value="0.7">
            </div>

            <p id="network-status" class="network-status" aria-live="polite"></p>

            <div class="actions">
                <button id="copy-song-btn" class="ghost" type="button">🔗 Copiar link</button>
                <button id="scroll-current-btn" class="ghost" type="button">🎯 Música atual</button>
            </div>
        </section>

        <aside class="panel upcoming-panel">
            <h2 class="section-title">PRÓXIMOS LANÇAMENTOS</h2>
            <div id="upcoming-container" class="upcoming-grid"></div>
        </aside>

        <section class="panel filters-panel">
            <div class="search-wrap">
                <input type="text" id="search-input" class="spray-input" placeholder="Pesquisar música...">
                <button id="search-btn" class="ctrl">🔍</button>
            </div>
            <select id="playlist-filter" class="spray-select">
                <option value="all">Todas as playlists</option>
            </select>
        </section>

        <section class="panel playlists-panel">
            <h2 class="section-title">PLAYLISTS</h2>
            <div class="playlists-container" id="playlists-container"></div>
        </section>

        <section class="panel songs-panel">
            <h2 class="section-title">MÚSICAS</h2>
            <div class="songs-container" id="songs-container"></div>
        </section>
    </main>

    <button id="profile-fab" class="profile-fab" type="button" aria-label="Abrir perfil">👤</button>

    <aside id="profile-drawer" class="profile-drawer" aria-hidden="true">
        <div class="profile-head">
            <h2 class="section-title">PERFIL</h2>
            <p class="profile-helper">Presets editáveis em <code>profile_presets.json</code>.</p>
            <button id="close-profile-btn" class="ghost" type="button">✕</button>
        </div>

        <div class="profile-grid">
            <div class="profile-preview" id="profile-preview">
                <img id="profile-preview-photo" src="https://files.catbox.moe/ye5x4f.png" alt="Foto do perfil">
                <h3 id="profile-preview-name">Seu nome</h3>
                <img id="profile-preview-title-image" src="https://files.catbox.moe/strc5w.png" alt="Imagem do título">
                <p id="profile-preview-title">Normal do Brawler • Mortis, o Magnífico</p>
            </div>

            <div class="profile-form">
                <label>Nome
                    <input type="text" id="profile-name" placeholder="Seu nome">
                </label>

                <label>Imagem de perfil (preset)
                    <select id="profile-image-select" class="spray-select"></select>
                </label>


                <label>Título do jogo (preset)
                    <select id="profile-title-select" class="spray-select"></select>
                </label>


                <label>Título custom (opcional)
                    <input type="text" id="profile-title-custom" placeholder="Ex: Guardião da Arena">
                </label>

                <div class="profile-actions">
                    <button id="save-profile-btn" class="ghost" type="button">💾 Salvar</button>
                    <button id="download-profile-btn" class="ghost" type="button">⬇️ Download</button>
                </div>
            </div>
        </div>
    </aside>

    <footer class="footer">
        <p>© 2025 BRAWL STARS SLOWED • Site de fã para fã</p>
    </footer>

    <audio id="audio-player"></audio>
    <script src="script.js"></script>
</body>
</html>
